services:
  - type: web
    name: stock-simulator
    runtime: docker
    region: oregon
    plan: free
    startCommand: sh -c "uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
    envVars:
      - key: ALLOWED_ORIGINS
        value: https://${RENDER_SERVICE_NAME}.onrender.com,http://localhost:3000
